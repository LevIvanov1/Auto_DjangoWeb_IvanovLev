<!DOCTYPE html>
<html lang="ru">
<head>
    <title>{% block title %}AutoStory{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link rel="icon" href="{% static 'iconka.ico' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'css/site.css' %}" />
    <script src="{% static 'scripts/jquery-1.10.2.js' %}"></script>
</head>
<body>
    <div class="container">
        <div class="header-with-logo">
            <a href="{% url 'home' %}" class="logo-link">
                <img src="{% static 'content/logo.jpeg' %}" alt="AutoStory" class="logo">
            </a>
            <h1>AUTOSTORY: АВТО С ИСТОРИЕЙ</h1>
        </div>

        <div class="menu">
            <a href="{% url 'home' %}">Главная</a>
            <a href="{% url 'blog' %}">Блог</a>
            <a href="{% url 'links' %}">Полезные ссылки</a>
            <a href="{% url 'contact' %}">Контакты</a>
            <a href="{% url 'about' %}">О нас</a>
            <a href="{% url 'pool' %}">Отзывы</a>
            <a href="{% url 'registration' %}">Регистрация</a>
            {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit">Выйти ({{ user.username }})</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}">Вход</a>
            {% endif %}
        </div>

        <div class="content">
            {% block content %}{% endblock %}
        </div>

        <hr />
        <footer>
            <p>AutoStory - Автомобили с историей</p>
        </footer>
    </div>
</body>
</html>
